<nav
  class="bg-gradient-to-r from-purple-600 via-indigo-600 to-blue-600 border-b border-purple-700 px-6 py-3 flex items-center justify-between shadow-lg z-20"
>
  <!-- LEFT -->
  <div class="flex items-center space-x-3">
    <div class="w-9 h-9 bg-purple-600 rounded-lg flex items-center justify-center shadow-md">
      <lucide-angular [img]="TowerControl" class="w-5 h-5 text-white"></lucide-angular>
    </div>
    <div class="flex flex-col">
      <span class="text-lg font-bold text-white">WireWhisperer</span>
      <span class="text-xs text-purple-200 hidden md:block">
        every cable tells a story – we make it sing
      </span>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="flex-1 max-w-2xl mx-6">
    <div class="relative flex gap-2">
      <div class="relative flex-1">
        <input
          type="text"
          placeholder="Szukaj projektów, klientów, technologii..."
          (input)="onSearch($event)"
          class="w-full pl-10 pr-4 py-2 rounded-lg bg-white/90 border text-sm"
        />
        <lucide-angular
          [img]="Search"
          class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-purple-400"
        ></lucide-angular>
      </div>

      <button
        (click)="performSearch()"
        class="bg-white text-purple-600 px-5 py-2 rounded-lg text-sm font-semibold"
      >
        Szukaj
      </button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="flex items-center space-x-4">
    @if (!isLoggedIn()) {
      <button
        (click)="login()"
        class="bg-white text-purple-700 px-5 py-2 rounded-lg text-sm font-semibold"
      >
        <lucide-angular [img]="ShieldCheck" class="w-5 h-5 inline"></lucide-angular>
        Zaloguj
      </button>
    } @else {
      <button [routerLink]="['/dashboard']">
        <lucide-angular [img]="LayoutDashboard" class="w-5 h-5 text-white"></lucide-angular>
      </button>

      <div class="flex items-center gap-3 text-white">
        <span>{{ user()?.name || 'User' }}</span>
        <button (click)="logout()" class="text-xs underline">
          Wyloguj
        </button>
      </div>
    }
  </div>
</nav>

<!-- TECHNOLOGY FILTER BAR -->
<div class="bg-gray-100 px-6 py-2 flex gap-4 overflow-x-auto">

  <button (click)="filterByTechnology(Tech.SiemensS7)" class="text-center">
    <div class="w-11 h-11 bg-indigo-500 rounded-lg flex items-center justify-center">
      <span class="text-white font-bold text-sm">S7</span>
    </div>
    <p class="text-[10px] mt-1">Siemens</p>
  </button>

  <button (click)="filterByTechnology(Tech.MitsubishiPlc)" class="text-center">
    <div class="w-11 h-11 bg-red-500 rounded-lg flex items-center justify-center">
      <span class="text-white font-bold text-sm">iQ</span>
    </div>
    <p class="text-[10px] mt-1">Mitsubishi</p>
  </button>

  <button (click)="filterByTechnology(Tech.AllenBradley)" class="text-center">
    <div class="w-11 h-11 bg-green-500 rounded-lg flex items-center justify-center">
      <span class="text-white font-bold text-sm">AB</span>
    </div>
    <p class="text-[10px] mt-1">Allen Bradley</p>
  </button>

  <button (click)="filterByTechnology(Tech.Ignition)" class="text-center">
    <div class="w-11 h-11 bg-orange-500 rounded-lg flex items-center justify-center">
      <span class="text-white font-bold text-sm">SC</span>
    </div>
    <p class="text-[10px] mt-1">SCADA</p>
  </button>

  <button (click)="filterByTechnology(Tech.OtherTech)" class="text-center">
    <div class="w-11 h-11 bg-blue-500 rounded-lg flex items-center justify-center">
      <span class="text-white font-bold text-sm">SP</span>
    </div>
    <p class="text-[10px] mt-1">Support</p>
  </button>

</div>
